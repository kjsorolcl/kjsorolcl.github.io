<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 60%, #000 100%);
      overflow: hidden;
    }

    #ruffle {
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<div id="ruffle"></div>
<script src="/digboy_save_bridge.js"></script>
<script>
  var swfobject = {};
  var player2;
  var ruffle2;
  var isLoadScript = false;

  function installTraceObserver(player) {
    const observer = function (message) {
      console.log(String(message));
    };
  
    try {
      player.traceObserver = observer;
      console.log("[DigboyTrace] legacy traceObserver installed");
    } catch (error) {
      console.warn("[DigboyTrace] legacy traceObserver failed", error);
    }
  
    try {
      if (typeof player.ruffle === "function") {
        player.ruffle().traceObserver = observer;
        console.log("[DigboyTrace] v1 traceObserver installed");
      }
    } catch (error) {
      console.warn("[DigboyTrace] v1 traceObserver failed", error);
    }
  }

  function getParams() {
    const result = {};
    let queryString = window.location.search;

    if (queryString.includes("?")) {
      const parts = queryString.split("?");
      queryString = parts.shift() + (parts.length ? "?" + parts.join("&") : "");
    }

    const params = new URLSearchParams(queryString);
    for (const [key, value] of params.entries()) result[key] = value;

    if (result.url) {
      try {
        let urlStr = result.url;
        if (urlStr.includes("?")) {
          const [base, ...rest] = urlStr.split("?");
          urlStr = base + "?" + rest.join("&");
        }
        const innerUrl = new URL(urlStr);
        for (const [key, value] of innerUrl.searchParams.entries()) result[key] = value;
        result.url = innerUrl.origin + innerUrl.pathname;
      } catch (error) {
        console.error("잘못된 URL:", result.url, error);
      }
    }
    return result;
  }

  function getParam(name) {
    return getParams()[name] || null;
  }

  var mobileWidth = window.innerWidth;
  var mobileHeight = window.innerHeight;
  if (getParam("width")) mobileWidth = parseInt(getParam("width"));
  if (getParam("height")) mobileHeight = parseInt(getParam("height"));

  let isUnpkg = getParam("unpkg") === "1";
  let isAgoVer = getParam("ago") === "1";
  let isFullScreen = getParam("full") === "1";
  let isKoreanFont = getParam("koreanfont") === "1";
  let isBaseEnabled = getParam("base") === "1";
  let isNewLib = getParam("newlib") === "1";
  let qualityParam = getParam("quality");
  let qualityMap = { "0": "low", "1": "medium", "2": "high" };
  let qualityValue = qualityMap[qualityParam] || null;
  var scriptUrl;

  if (isNewLib) {
    scriptUrl = "https://unpkg.com/@ruffle-rs/ruffle";
  } else if (isAgoVer) {
    scriptUrl = "https://kjsorolcl.github.io/ruffle_nightly_2021_01_17_selfhosted/ruffle.js";
  } else if (isFullScreen) {
    scriptUrl = "https://flashgamehouse.github.io/ruffle.js";
  } else if (isUnpkg) {
    scriptUrl = "https://flashgamehouse.github.io/240607/ruffle.js";
  } else {
    scriptUrl = "https://kjsorolcl.github.io/mobile/ruffle.js";
  }

  var script = document.createElement("script");
  script.type = "text/javascript";
  script.async = true;
  script.src = scriptUrl;

  script.onload = function () {
    isLoadScript = true;
    swfobject.embedSWF = async function (url, cont, width, height) {
      const params = getParams();
      let loadUrl = url;
      let digboyPrepare = null;
      const traceMode = params.trace === "1";
      
      if (window.FlashGameMobileDigboySave) {
        digboyPrepare = await window.FlashGameMobileDigboySave.prepare(url, {
          params,
          patchedSwfUrl: traceMode
            ? "/swf/digboy/boss_interval_fix_test.swf"
            : "/swf/digboy/digboy_save_v1.swf"
        });
        if (digboyPrepare.enabled) loadUrl = digboyPrepare.url;
      }

      window.RufflePlayer.config = {
        autoplay: "on",
        unmuteOverlay: "hidden",
        preloader: false,
        warnOnUnsupportedContent: false,
        menu: false,
        contextMenu: false,
        forceScale: isFullScreen,
        forceAlign: isFullScreen
      };

      if (digboyPrepare && digboyPrepare.enabled && window.FlashGameMobileDigboySave) {
        Object.assign(window.RufflePlayer.config, window.FlashGameMobileDigboySave.ruffleConfigPatch());
      }

      if (isKoreanFont) {
        window.RufflePlayer.config.fontSources = [
          "https://kjsorolcl.github.io/Noto%20Sans.swf",
          "https://kjsorolcl.github.io/%E1%84%83%E1%85%A9%E1%86%AE%E1%84%8B%E1%85%AE%E1%86%B7.swf",
          "https://kjsorolcl.github.io/font/%E1%84%80%E1%85%AE%E1%86%AF%E1%84%85%E1%85%B5%E1%86%B7.swf"
        ];
        window.RufflePlayer.config.defaultFonts = {
          "sans": ["굴림", "나눔", "Noto Sans", "돋움", "Arial", "Helvetica", "sans-serif"]
        };
      }

      if (qualityValue) window.RufflePlayer.config.quality = qualityValue;
      if (isBaseEnabled) {
        window.RufflePlayer.config.base = "http://kjsorolcl.github.io";
      } else if (getParam("base") === "2") {
        window.RufflePlayer.config.base = "https://flashgamehouse.github.io";
      }

      var ruffle = window.RufflePlayer.newest();
      var player = Object.assign(document.getElementById(cont).appendChild(ruffle.createPlayer()), {
        width: width,
        height: height,
        style: "width: " + width + "px; height: " + height + "px"
      });

      if (traceMode) {
        try {
          player.traceObserver = function (message) {
            console.log(String(message));
          };
          console.log("[DigboyTrace] traceObserver installed");
          installTraceObserver(player);
        } catch (error) {
          console.warn("[DigboyTrace] traceObserver install failed", error);
        }
      }

      player.load({ url: loadUrl }).then(() => {
        if (traceMode) installTraceObserver(player);
        console.log("SWF Loaded");
      });
      player2 = player;
      ruffle2 = ruffle;
      if (isFullScreen) player2.enterFullscreen();
    };
  };
  document.head.appendChild(script);

  var pollCount = 0;
  var pollWindowHeight = function () {
    if (window.innerHeight === 0 || !isLoadScript) {
      pollCount++;
      if (pollCount < 200) setTimeout(pollWindowHeight, 50);
    } else {
      mobileWidth = window.innerWidth;
      mobileHeight = window.innerHeight;
      if (getParam("width")) mobileWidth = parseInt(getParam("width"));
      if (getParam("height")) mobileHeight = parseInt(getParam("height"));
      swfobject.embedSWF(getParam("url"), "ruffle", mobileWidth, mobileHeight);

      var lastTouchEnd = 0;
      document.addEventListener("touchend", function (event) {
        var now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
      }, false);
    }
  };
  document.addEventListener("DOMContentLoaded", pollWindowHeight, false);
</script>
